<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet">
    <script src="script.js" defer></script>
    <title>Calculator</title>
</head>
<body>
    <div id="calculator">
        <p id="display">Test</p>
        <div id="container">
            <div class="buttons" id="numbers">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>0</button>
            </div>
            <div class ="buttons" id="symbols">
                <button>+</button>
                <button>=</button>
                <button>x</button>
                <button>&divide</button>
                <button>Clear</button>
            </div>
        </div>
    </div>
</body>
</html>
